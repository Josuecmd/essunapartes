<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Control - Parte General de Guardiamarinas</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1e293b;
            --secondary: #0f172a;
            --accent: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: #334155;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: 0.5px; }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid var(--accent);
        }
        .stat-card.success { border-left-color: var(--success); }
        .stat-card.danger { border-left-color: var(--danger); }
        .stat-number { font-size: 20px; font-weight: bold; color: var(--secondary); }
        .stat-label { font-size: 12px; color: #64748b; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
        input, select {
            width: 100%; padding: 10px; border: 1px solid #cbd5e1;
            border-radius: 6px; box-sizing: border-box; font-size: 14px;
        }
        .btn {
            background-color: var(--accent); color: white; border: none;
            padding: 12px; font-size: 14px; font-weight: 600;
            border-radius: 6px; cursor: pointer; width: 100%;
            transition: background 0.2s; display: flex;
            justify-content: center; align-items: center; gap: 8px;
        }
        .btn:hover { background-color: #1d4ed8; }
        .btn-success { background-color: var(--success); margin-top: 15px; }
        .btn-success:hover { background-color: #15803d; }
        table {
            width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px;
        }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f1f5f9; color: var(--primary); }
        .status-badge {
            padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: 600;
        }
        .badge-fila { background: #dcfce7; color: #15803d; }
        .badge-comision { background: #dbeafe; color: #1e40af; }
        .badge-other { background: #f1f5f9; color: #475569; }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-shield-halved"></i> TABLERO DE CONTROL DE PARTES</h1>
    </div>

    <div class="container">
        <div class="card">
            <h3><i class="fa-user-plus"></i> Registrar Novedad</h3>
            <div class="form-group">
                <label>Nombre del Alumno</label>
                <input type="text" id="alumnoNombre" placeholder="Ej: Juan Pérez">
            </div>
            <div class="form-group">
                <label>Sección</label>
                <select id="alumnoSeccion">
                    <option value="Primer Año Alfa">Primer Año Alfa</option>
                    <option value="Primer Año Bravo">Primer Año Bravo</option>
                    <option value="Segundo Año Alfa">Segundo Año Alfa</option>
                </select>
            </div>
            <div class="form-group">
                <label>Estado</label>
                <select id="alumnoEstado">
                    <option value="FILA">FILA</option>
                    <option value="COMISIÓN">COMISIÓN</option>
                    <option value="EXC. LITERA">EXC. LITERA</option>
                    <option value="EXC. FORMACIÓN">EXC. FORMACIÓN</option>
                </select>
            </div>
            <button class="btn" onclick="agregarAlumno()"><i class="fa-solid fa-plus"></i> Insertar al Parte</button>
            
            <hr style="margin: 25px 0; border: 0; border-top: 1px solid #e2e8f0;">
            
            <div class="form-group">
                <label>Nombre del Archivo Excel</label>
                <input type="text" id="fileName" value="Parte_General_Brigada">
            </div>
            <button class="btn btn-success" onclick="exportarParte()"><i class="fa-solid fa-file-excel"></i> Exportar a Excel</button>
        </div>

        <div class="card">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalAlumnos">0</div>
                    <div class="stat-label">Total Fuerza</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-number" id="totalFila">0</div>
                    <div class="stat-label">En Fila</div>
                </div>
                <div class="stat-card danger">
                    <div class="stat-number" id="totalNovedades">0</div>
                    <div class="stat-label">Novedades</div>
                </div>
            </div>

            <h3><i class="fa-solid fa-list-check"></i> Fuerza Nominal Existente</h3>
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Sección</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaAlumnos">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let listaGuardiamarinas = [];

        function actualizarContadores() {
            document.getElementById('totalAlumnos').innerText = listaGuardiamarinas.length;
            const fila = listaGuardiamarinas.filter(a => a.estado === 'FILA').length;
            document.getElementById('totalFila').innerText = fila;
            document.getElementById('totalNovedades').innerText = listaGuardiamarinas.length - fila;
        }

        function agregarAlumno() {
            const nombre = document.getElementById('alumnoNombre').value;
            const seccion = document.getElementById('alumnoSeccion').value;
            const estado = document.getElementById('alumnoEstado').value;

            if (!nombre) return alert("Por favor ingresa el nombre");

            const nuevo = { id: listaGuardiamarinas.length + 1, nombre, seccion, estado };
            listaGuardiamarinas.push(nuevo);
            
            document.getElementById('alumnoNombre').value = '';
            renderTabla();
        }

        function eliminarAlumno(id) {
            listaGuardiamarinas = listaGuardiamarinas.filter(a => a.id !== id);
            renderTabla();
        }

        function renderTabla() {
            const tbody = document.getElementById('tablaAlumnos');
            tbody.innerHTML = '';
            listaGuardiamarinas.forEach(a => {
                const badgeClass = a.estado === 'FILA' ? 'badge-fila' : (a.estado === 'COMISIÓN' ? 'badge-comision' : 'badge-other');
                tbody.innerHTML += `
                    <tr>
                        <td>${a.nombre}</td>
                        <td>${a.seccion}</td>
                        <td><span class="status-badge ${badgeClass}">${a.estado}</span></td>
                        <td><button style="background:none;border:none;color:var(--danger);cursor:pointer;" onclick="eliminarAlumno(${a.id})"><i class="fa-solid fa-trash"></i></button></td>
                    </tr>
                `;
            });
            actualizarContadores();
        }

        async function exportarParte() {
            if(listaGuardiamarinas.length === 0) return alert("No hay alumnos en la lista para exportar");
            const filename = document.getElementById('fileName').value;

            try {
                const response = await fetch('/api/parte/procesar-y-exportar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre_archivo: filename, guardiamarinas: listaGuardiamarinas })
                });
                if (!response.ok) throw new Error("Error en servidor");
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename + ".xlsx";
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch (e) {
                alert("Ocurrió un error al procesar el archivo Excel.");
            }
        }
    </script>
</body>
</html>
